agent:
  name: Tokenized Equity Strategy Agent
  mode: research
  base_currency: USD
  score_buy_threshold: 70
  score_watch_threshold: 40
  score_caution_threshold: -40
  score_exit_threshold: -70

inputs:
  watchlist_path: data/watchlist.csv

outputs:
  reports_dir: reports
  latest_signals_csv: reports/latest_signals.csv
  latest_signals_html: reports/latest_signals.html
  paper_trades_csv: reports/paper_trades.csv

risk:
  max_position_percent: 5.0
  max_spread_percent: 1.5
  max_premium_percent: 2.0
  min_liquidity_score: 40

data:
  tokenized_market_mode: simulated
  yfinance_period: 5d
  yfinance_interval: 1d
