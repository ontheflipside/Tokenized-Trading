agent:
  name: Tokenized Equity Strategy Agent
  mode: paper
  base_currency: USD
  report_directory: reports

risk:
  max_position_usd: 1000
  max_portfolio_exposure_usd: 5000
  stop_loss_pct: 5
  take_profit_pct: 8

signals:
  dislocation_buy_threshold_pct: 1.50
  dislocation_sell_threshold_pct: -1.50
  min_liquidity_usd_1pct_depth: 25000
  min_orderbook_imbalance: 0.15

watchlist:
  - equity: AAPL
    token_pair: AAPLx/USD
  - equity: NVDA
    token_pair: NVDAx/USD
  - equity: TSLA
    token_pair: TSLAx/USD
  - equity: MSFT
    token_pair: MSFTx/USD

kraken:
  public_api_base: https://api.kraken.com/0/public
  orderbook_depth: 25
